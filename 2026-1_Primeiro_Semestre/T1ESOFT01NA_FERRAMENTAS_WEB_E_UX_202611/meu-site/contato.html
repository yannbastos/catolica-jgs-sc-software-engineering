<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Contato</title>
  </head>
  <body>
    <h1>Contato</h1>

    <nav>
      <a href="indice.html">Início</a> | <a href="sobre.html">Sobre</a> |
      <a href="contato.html">Contato</a>
    </nav>

    <p>Entre em contato comigo através do formulário abaixo:</p>

    <form>
      <p>
        <label>Nome:</label><br />
        <input type="text" name="nome" />
      </p>

      <p>
        <label>Email:</label><br />
        <input type="email" name="email" />
      </p>

      <p>
        <label>Mensagem:</label><br />
        <textarea name="mensagem" rows="4" cols="30"></textarea>
      </p>

      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
